<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="phoneBodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="screenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22c55e" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#334155" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#1e293b" stop-opacity="0.9" />
    </linearGradient>
  </defs>
  
  <rect width="100%" height="100%" fill="url(#bgGrad)" rx="12" />
  
  <!-- Outer glowing rings -->
  <circle cx="400" cy="300" r="280" fill="none" stroke="#22c55e" stroke-width="1" opacity="0.05" />
  <circle cx="400" cy="300" r="200" fill="none" stroke="#06b6d4" stroke-width="1" stroke-dasharray="10 10" opacity="0.1" />

  <!-- PHONE CONTAINER -->
  <g transform="translate(260, 40)">
    <!-- Shadow -->
    <rect x="-10" y="10" width="300" height="520" rx="42" fill="#000000" opacity="0.6" filter="blur(10px)" />
    
    <!-- Phone Outer Bezel -->
    <rect x="0" y="0" width="280" height="520" rx="36" fill="url(#phoneBodyGrad)" stroke="#475569" stroke-width="4" />
    
    <!-- Phone Inner Screen Bezel -->
    <rect x="8" y="8" width="264" height="504" rx="28" fill="#020617" />
    
    <!-- Screen Glass -->
    <rect x="12" y="12" width="256" height="496" rx="24" fill="url(#screenGrad)" />
    
    <!-- Dynamic Island / Camera Notch -->
    <rect x="90" y="20" width="100" height="18" rx="9" fill="#000000" />
    <circle cx="105" cy="29" r="3.5" fill="#1e293b" />
    <rect x="135" y="27" width="40" height="4" rx="2" fill="#111827" />

    <!-- SCREEN CONTENT -->
    <!-- Status Bar -->
    <text x="35" y="32" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="10" font-weight="600" fill="#ffffff">9:41</text>
    <!-- Status Bar Icons -->
    <g transform="translate(210, 24)" fill="#ffffff">
      <!-- Signal -->
      <rect x="0" y="6" width="3" height="4" rx="0.5" />
      <rect x="5" y="4" width="3" height="6" rx="0.5" />
      <rect x="10" y="2" width="3" height="8" rx="0.5" />
      <!-- Wifi -->
      <path d="M 17 2 A 4 4 0 0 1 25 2" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"/>
      <!-- Battery -->
      <rect x="29" y="3" width="16" height="8" rx="2" fill="none" stroke="#ffffff" stroke-width="1" />
      <rect x="31" y="5" width="10" height="4" rx="1" fill="#22c55e" />
    </g>

    <!-- App Header -->
    <g transform="translate(20, 65)">
      <circle cx="20" cy="20" r="16" fill="#1e293b" />
      <!-- Back Arrow -->
      <path d="M23,15 L17,20 L23,25" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
      <text x="50" y="25" font-family="'Poppins', sans-serif" font-size="16" font-weight="700" fill="#ffffff">BlockPay SA</text>
      <!-- Menu Button -->
      <circle cx="225" cy="15" r="2.5" fill="#ffffff" />
      <circle cx="225" cy="21" r="2.5" fill="#ffffff" />
      <circle cx="225" cy="27" r="2.5" fill="#ffffff" />
    </g>

    <!-- Main Card (Dashboard Widget) -->
    <g transform="translate(20, 115)">
      <rect width="240" height="120" rx="16" fill="url(#cardGrad)" stroke="#475569" stroke-width="0.8" />
      <text x="18" y="30" font-family="'Poppins', sans-serif" font-size="11" font-weight="600" fill="#94a3b8">MOBILE APP INTERFACE</text>
      <text x="18" y="65" font-family="'Poppins', sans-serif" font-size="24" font-weight="800" fill="#ffffff">Crypto Pay Gateway</text>
      
      <!-- Mini Progress bar -->
      <rect x="18" y="85" width="204" height="8" rx="4" fill="#0f172a" />
      <rect x="18" y="85" width="160" height="8" rx="4" fill="url(#accent)" />
      <text x="18" y="108" font-family="'Poppins', sans-serif" font-size="10" font-weight="600" fill="#22c55e">✓ System Optimization Active</text>
    </g>

    <!-- App Section Title -->
    <text x="22" y="265" font-family="'Poppins', sans-serif" font-size="13" font-weight="700" fill="#ffffff">RECENT ACTIVITIES</text>

    <!-- List Items inside App -->
    <g transform="translate(20, 280)">
      <!-- Item 1 -->
      <rect x="0" y="0" width="240" height="48" rx="10" fill="#0f172a" stroke="#1e293b" stroke-width="1" />
      <circle cx="24" cy="24" r="14" fill="#22c55e" opacity="0.2" />
      <path d="M20,24 L23,27 L28,21" fill="none" stroke="#22c55e" stroke-width="2" stroke-linecap="round" />
      <rect x="50" y="15" width="110" height="8" rx="4" fill="#ffffff" />
      <rect x="50" y="27" width="70" height="6" rx="3" fill="#475569" />
      <text x="210" y="28" text-anchor="end" font-family="'Poppins', sans-serif" font-size="10" font-weight="600" fill="#22c55e">SUCCESS</text>

      <!-- Item 2 -->
      <g transform="translate(0, 58)">
        <rect x="0" y="0" width="240" height="48" rx="10" fill="#0f172a" stroke="#1e293b" stroke-width="1" />
        <circle cx="24" cy="24" r="14" fill="#3b82f6" opacity="0.2" />
        <!-- Sync icon inside circle -->
        <circle cx="24" cy="24" r="6" fill="none" stroke="#3b82f6" stroke-width="2" stroke-dasharray="8 4" />
        <rect x="50" y="15" width="90" height="8" rx="4" fill="#ffffff" />
        <rect x="50" y="27" width="110" height="6" rx="3" fill="#475569" />
        <text x="210" y="28" text-anchor="end" font-family="'Poppins', sans-serif" font-size="10" font-weight="600" fill="#3b82f6">SYNCING</text>
      </g>

      <!-- Item 3 -->
      <g transform="translate(0, 116)">
        <rect x="0" y="0" width="240" height="48" rx="10" fill="#0f172a" stroke="#1e293b" stroke-width="1" />
        <circle cx="24" cy="24" r="14" fill="#a855f7" opacity="0.2" />
        <rect x="50" y="15" width="120" height="8" rx="4" fill="#ffffff" />
        <rect x="50" y="27" width="50" height="6" rx="3" fill="#475569" />
        <text x="210" y="28" text-anchor="end" font-family="'Poppins', sans-serif" font-size="10" font-weight="600" fill="#a855f7">QUEUED</text>
      </g>
    </g>

    <!-- Bottom App Navigation Bar -->
    <g transform="translate(12, 455)">
      <rect width="256" height="40" fill="#090d16" rx="0" />
      <line x1="0" y1="0" x2="256" y2="0" stroke="#1e293b" stroke-width="1" />
      
      <!-- Home tab -->
      <circle cx="35" cy="16" r="6" fill="#22c55e" />
      <!-- Charts tab -->
      <rect x="85" y="10" width="4" height="12" rx="1" fill="#475569" />
      <rect x="92" y="6" width="4" height="16" rx="1" fill="#475569" />
      <rect x="99" y="12" width="4" height="10" rx="1" fill="#475569" />
      <!-- Inbox tab -->
      <rect x="145" y="8" width="18" height="12" rx="2" fill="none" stroke="#475569" stroke-width="2" />
      <!-- Profile tab -->
      <circle cx="215" cy="12" r="5" fill="#475569" />
      <path d="M205,25 C205,20 225,20 225,25" fill="none" stroke="#475569" stroke-width="2" />

      <!-- Apple Home Indicator Bar -->
      <rect x="78" y="32" width="100" height="4" rx="2" fill="#ffffff" opacity="0.8" />
    </g>
  </g>
  
  <!-- Right Label Panel -->
  <g transform="translate(560, 200)">
    <rect width="220" height="160" rx="12" fill="#0f172a" stroke="#334155" stroke-width="1" />
    <text x="20" y="35" font-family="'Poppins', sans-serif" font-size="14" font-weight="700" fill="#ffffff">MOBILE DEVICE</text>
    <text x="20" y="55" font-family="'Poppins', sans-serif" font-size="11" font-weight="600" fill="#22c55e">IOS &amp; ANDROID READY</text>
    
    <text x="20" y="90" font-family="'Poppins', sans-serif" font-size="12" font-weight="400" fill="#94a3b8">
      Sleek app architecture,
    </text>
    <text x="20" y="110" font-family="'Poppins', sans-serif" font-size="12" font-weight="400" fill="#94a3b8">
      native responsive flows,
    </text>
    <text x="20" y="130" font-family="'Poppins', sans-serif" font-size="12" font-weight="400" fill="#94a3b8">
      and fast performance.
    </text>
  </g>
</svg>