<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#bg)" rx="12" />
  
  <!-- Code Window Mockup -->
  <rect x="40" y="40" width="720" height="420" rx="10" fill="#090d16" stroke="#1e293b" stroke-width="1.5" />
  
  <!-- Header Bar -->
  <rect x="40" y="40" width="720" height="40" rx="10" fill="#0f172a" />
  <circle cx="65" cy="60" r="6" fill="#ef4444" />
  <circle cx="85" cy="60" r="6" fill="#eab308" />
  <circle cx="105" cy="60" r="6" fill="#22c55e" />
  <text x="135" y="65" font-family="'Poppins', sans-serif" font-size="11" font-weight="600" fill="#475569">acme retail/app.js</text>

  <!-- Sidebar File Explorer -->
  <rect x="40" y="80" width="150" height="380" fill="#070a13" />
  <text x="55" y="110" font-family="'Poppins', sans-serif" font-size="11" font-weight="700" fill="#64748b">WORKSPACE</text>
  <text x="55" y="140" font-family="'Poppins', sans-serif" font-size="12" fill="#38bdf8">▶ components</text>
  <text x="55" y="170" font-family="'Poppins', sans-serif" font-size="12" fill="#38bdf8">▼ styles</text>
  <text x="70" y="195" font-family="'Poppins', sans-serif" font-size="12" fill="#94a3b8">index.css</text>
  <text x="55" y="225" font-family="'Poppins', sans-serif" font-size="12" fill="#e2e8f0">📄 app.js</text>
  <text x="55" y="255" font-family="'Poppins', sans-serif" font-size="12" fill="#94a3b8">📄 package.json</text>

  <!-- Editor Coding Lines -->
  <!-- Line Numbers -->
  <g fill="#334155" font-family="monospace" font-size="13">
    <text x="210" y="120">1</text>
    <text x="210" y="145">2</text>
    <text x="210" y="170">3</text>
    <text x="210" y="195">4</text>
    <text x="210" y="220">5</text>
    <text x="210" y="245">6</text>
    <text x="210" y="270">7</text>
    <text x="210" y="295">8</text>
    <text x="210" y="320">9</text>
    <text x="210" y="345">10</text>
    <text x="210" y="370">11</text>
  </g>
  
  <!-- Code text -->
  <g font-family="monospace" font-size="13" font-weight="bold">
    <text x="240" y="120" fill="#f43f5e">import</text>
    <text x="295" y="120" fill="#ffffff">React, { useState }</text>
    <text x="445" y="120" fill="#f43f5e">from</text>
    <text x="485" y="120" fill="#10b981">'react'</text>

    <text x="240" y="145" fill="#f43f5e">import</text>
    <text x="295" y="145" fill="#ffffff">{ WebApp }</text>
    <text x="390" y="145" fill="#f43f5e">from</text>
    <text x="430" y="145" fill="#10b981">'codenova-core'</text>

    <text x="240" y="195" fill="#f43f5e">const</text>
    <text x="290" y="195" fill="#3b82f6">CodeNovaApp</text>
    <text x="395" y="195" fill="#f43f5e">=</text>
    <text x="410" y="195" fill="#ffffff">()</text>
    <text x="430" y="195" fill="#f43f5e">=&gt;</text>
    <text x="450" y="195" fill="#ffffff">{</text>

    <text x="260" y="220" fill="#f43f5e">return</text>
    <text x="315" y="220" fill="#ffffff">(</text>

    <text x="280" y="245" fill="#3b82f6">&lt;div</text>
    <text x="320" y="245" fill="#a855f7">className</text>
    <text x="400" y="245" fill="#f43f5e">=</text>
    <text x="410" y="245" fill="#10b981">"app-container"</text>
    <text x="535" y="245" fill="#3b82f6">&gt;</text>

    <text x="300" y="270" fill="#3b82f6">&lt;h1&gt;</text>
    <text x="335" y="270" fill="#ffffff">E-Commerce Engine</text>
    <text x="335" y="295" fill="#eab308" font-size="11">// Developed by CodeNova Tech</text>
    <text x="300" y="320" fill="#3b82f6">&lt;/h1&gt;</text>

    <text x="300" y="345" fill="#3b82f6">&lt;WebApp</text>
    <text x="365" y="345" fill="#a855f7">status</text>
    <text x="420" y="345" fill="#f43f5e">=</text>
    <text x="430" y="345" fill="#10b981">"optimal"</text>
    <text x="510" y="345" fill="#3b82f6">/&gt;</text>

    <text x="280" y="370" fill="#3b82f6">&lt;/div&gt;</text>
    <text x="260" y="395" fill="#ffffff">)</text>
    <text x="240" y="420" fill="#ffffff">}</text>
  </g>
  
  <!-- Mini floating glowing bracket -->
  <text x="630" y="250" font-family="'Poppins', sans-serif" font-size="90" font-weight="900" fill="#3b82f6" opacity="0.15">&lt;/&gt;</text>
</svg>