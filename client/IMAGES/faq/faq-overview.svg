  <path d="M250,300 L300,240 L350,260 L400,180 L450,210 L500,140 L550,190 L600,130 L650,160 L700,110 Q730,120 750,150" fill="none" stroke="#06b6d4" stroke-width="3" />
  <path d="M250,300 L300,240 L350,260 L400,180 L450,210 L500,140 L550,190 L600,130 L650,160 L700,110 L750,150 L750,320 L250,320 Z" fill="none" opacity="0.15" />
  
  <line x1="250" y1="320" x2="750" y2="320" stroke="#334155" stroke-width="1" />
  <line x1="250" y1="120" x2="750" y2="120" stroke="#1e293b" stroke-width="0.5" />
  <line x1="250" y1="170" x2="750" y2="170" stroke="#1e293b" stroke-width="0.5" />
  <line x1="250" y1="220" x2="750" y2="220" stroke="#1e293b" stroke-width="0.5" />
  <line x1="250" y1="270" x2="750" y2="270" stroke="#1e293b" stroke-width="0.5" />

  <!-- Data Cards -->
