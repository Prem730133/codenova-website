<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <linearGradient id="blogBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <linearGradient id="iconBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#blogBg)" rx="12" />
  
  <!-- Glowing neon circle in background -->
  <circle cx="650" cy="250" r="150" fill="none" stroke="#06b6d4" stroke-width="4" opacity="0.1" />
  <circle cx="650" cy="250" r="80" fill="none" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="8 8" opacity="0.2" />

  <!-- Tech graphics/illustrations -->
  <g transform="translate(100, 200)">
    <rect x="-40" y="-80" width="300" height="180" rx="8" fill="#0b1320" stroke="#334155" stroke-width="1.5" />
    <!-- Code line graphics -->
    <rect x="-20" y="-60" width="120" height="8" rx="4" fill="#64748b" />
    <rect x="-20" y="-40" width="220" height="8" rx="4" fill="#3b82f6" />
    <rect x="-20" y="-20" width="180" height="8" rx="4" fill="#06b6d4" />
    <rect x="-20" y="0" width="150" height="8" rx="4" fill="#8b5cf6" />
    <rect x="-20" y="20" width="90" height="8" rx="4" fill="#64748b" />
    <circle cx="230" cy="50" r="20" fill="url(#iconBg)" />
    <!-- Checkmark inside circle -->
    <path d="M222,50 L228,56 L238,44" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
  </g>

  <!-- Article Details -->
  <g transform="translate(420, 150)">
    <rect width="100" height="25" rx="12" fill="#3b82f6" opacity="0.2" />
    <text x="50" y="17" text-anchor="middle" font-family="'Poppins', sans-serif" font-size="11" font-weight="700" fill="#3b82f6">GROWTH</text>
    
    <text y="70" font-family="'Poppins', sans-serif" font-size="28" font-weight="800" fill="#ffffff" width="340">
      SEO and Digital Product Scaling Strategies
    </text>
    <text y="140" font-family="'Poppins', sans-serif" font-size="14" font-weight="400" fill="#94a3b8" width="340">
      Exploring next-generation digital standards and standard frameworks for modern web developments.
    </text>
  </g>
</svg>