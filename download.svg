<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <radialGradient id="logoGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="60%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <circle cx="50%" cy="50%" r="46" fill="#0b1320" stroke="url(#logoGrad)" stroke-width="3" />
  <circle cx="50%" cy="50%" r="35" fill="none" stroke="#1e293b" stroke-width="1" stroke-dasharray="4 4" />
  <!-- Abstract Tech N Shape -->
  <path d="M35,65 L35,35 L48,52 L61,35 L61,65" fill="none" stroke="url(#logoGrad)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <!-- Orbiting dots -->
  <circle cx="50%" cy="20%" r="3" fill="#38bdf8" />
  <circle cx="76%" cy="65%" r="3" fill="#818cf8" />
</svg>